<!--  Exemplos de tags HTML: 
<html>: Define o documento HTML como um todo. 
<head>: Contém informações sobre o documento, como título e metadados. 
<title>: Define o título da página, exibido na aba do navegador. 
<body>: Contém todo o conteúdo visível da página. 
<h1> a <h6>: Define títulos de diferentes níveis (do maior para o menor). 
<p>: Define um parágrafo. 
<a>: Define um link. 
<img>: Insere uma imagem. 
<ul>, <ol>, <li>: Define listas não ordenadas e ordenadas, respectivamente.
