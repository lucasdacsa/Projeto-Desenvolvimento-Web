<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix</title>

  <!---Em HTML, a propriedade (padding) é usada para criar espaço interno
 ao redor do conteúdo de um elemento HTML, dentro de sua borda.
 (margin) Em CSS é usada para criar um espaço ao redor de um elemento HTML, fora de suas bordas--->

 <!--Heading= cor da parte de cima do titulo
    .titulo1= css da fonte lateral esquerda
    .titulo2= css da fonte lateral esquerda
     a= css da fonte das letras-->

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    #heading {
      display: flex;
      background-color: red;
      justify-content: space-between;
      align-items: center;
    }

    .logo1 {
      padding: 15px;
      font-size: 16px;
      text-transform: uppercase;
    }

    .logo2 {
      padding: 15px;
      font-size: 16px;
      text-transform: uppercase;
    }

    #heading a {
      color: white;
      text-decoration: none;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
    <!--A tag <header> em HTML serve para definir um cabeçalho para uma seção de uma página web-->
  <header id="heading">

    <h1 class="logo1">
    <a href="#">Netflix</a>
    </h1>

    <h2 class="logo2">
    <a href="#">Netflix</a>
    </h2>

  </header>

</body>
</html>
