<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>estudo do html</title>

<!--Cabeça(head)= area de configurações do site como titulo, linkar css e colocar outras informações adicionais
-->
</head>

<!--Corpo(body)= é dentro do corpo onde se coloca os conteudos do site em si. 
Dentre eles podemos citar o paragrafo <p>ola mundo<p>. 
Titulo= (h1), Subtitulo(h2), Uma imagem (img) e assim por diante  -->
<body>

    <h1>Titulo Grandão</h1>
    <h2>Sou um Subtitulo</h2>
    
    <p>Ola Mundo</p>
    <img src="anime.webp" alt="imagem">

    <!--Informações Adicionais
     para criar hipertexto usar a tag= 
     <a>
      oque a oque liga uma coisa a outra. (exemplo um link a outro) -->
    <a href="https://google.com.">GOOGLE</a>
    <!--Pra finalizar pode ser colocado o rodapé do site chamado (footer)
    pode ser usado para colocar informações extras para o usuario ou apenas o copyright-->
    <footer>Copyright 2025. Todos os direitos reservados.
    </footer>
</body>
</html>
