<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santuário das Imagens Perdidas</title>
    
    <!--
    background-color: ; Define a cor de fundo da página
    text-align: center; Faz com que todo o texto (e também os links e imagens em linha) fiquem centralizados na tela.
    font-family: Arial; Define que a fonte do texto
    -->
    <style> 

    body { background-color: aqua;
    text-align: center;
    font-family: Arial;
         }

 
    img {margin: 10px;
    border: 3px solid #333;
    border:radius 10px;}
         
    </style>
    
<!--                                  Explicações do img
margin: 10px;
 Cria um espaçamento de 10 pixels em volta da imagem (como se desse um "respiro"). .

border: 3px solid #333;
 Coloca uma borda sólida preta ao redor da imagem, com 3 pixels de espessura (O #333 é um cinza escuro — quase preto.)

border-radius: 10px;
 Arredonda os cantos da borda da imagem, deixando ela com um efeito suave e arredondado.
-->

</head>
<body>
    <h2>❄️Totem de Gelo</h2>
    <a href="https://i.pinimg.com/736x/ff/27/c4/ff27c4f8b5e47e6987e219f75c4ba162.jpg">Totem de Gelo</a>
    
    <h2>🔥Totem de Fogo</h2>
    <a href="https://i.pinimg.com/736x/ca/0f/50/ca0f5005aa7e009b8a89a399ed9a10c2.jpg">Totem do Fogo</a>
    
    <h2>⚡Totem da Tempestade</h2>
    <a href="https://i.pinimg.com/1200x/33/e4/8b/33e48b0ea3f6d7bf261c95a0cbd92f80.jpg">Totem da Tempestade</a>
    
<p>Com os três totens ativados, um portal se abre... Para onde levará Yuki?</p>

<a href="#">Avançar para a próxima fase</a>

</body>
</html>
